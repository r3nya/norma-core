appId: dev.normacore.station-app
productName: NormaCore Station
directories:
  output: release
files:
  - dist/**/*
mac:
  category: public.app-category.developer-tools
  icon: build/icon.icns
  target:
    - dmg
    - zip
linux:
  icon: build/icon.png
  category: Development
  executableName: normacore-station
  maintainer: NormaCore <hello@normacore.dev>
  vendor: NormaCore
  desktop:
    Name: NormaCore Station
    Comment: Physical Operations Platform
    StartupWMClass: normacore-station
  target:
    - AppImage
    - deb
    - rpm
    - tar.gz
extraResources:
  - from: ../station-viewer/dist
    to: station-viewer-dist
  - from: ../../../../target/release
    to: bin
    filter:
      - station
