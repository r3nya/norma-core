name: Station App PR Check

env:
  NODE_VERSION: "22"

on:
  pull_request:
    paths:
      - "software/station/clients/station-app/**"

jobs:
  lint-typecheck-build:
    name: Lint, Typecheck and Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: software/station/clients/station-app
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "yarn"
          cache-dependency-path: software/station/clients/station-app/yarn.lock

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Lint
        run: yarn lint

      - name: Typecheck
        run: yarn type-check

      - name: Build
        run: yarn build
